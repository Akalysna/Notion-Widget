<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: transparent;
      display: flex;
      align-items: center;
      /* justify-content: center; */
      font-family: 'Inter', sans-serif;
      color: #dc448b;
    }

    #background {
      /* position: fixed;
      top: 0;
      left: 0; */
      /* width: 5em; */
      /* height: 2rem; */
      background: #fdd3e7;
      z-index: -1;
      margin-right: 1em;
      padding: 1em;
      justify-content: center;
      align-items: center;
      font-family: cursive;
      font-weight: bold;
      border-radius: 0.5em;
    }

    #clock {
      font-size: 3rem;
      font-weight: 600;
      font-family: cursive;
    }
  </style>
</head>

<body>
  <div id="background"></div>
  <div id="clock"></div>
  <script>
    function tick() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('fr-FR');
    }
    function date() {
      document.getElementById('background').textContent =
        new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    setInterval(tick, 1000);
    tick();
    date();
  </script>
  <!-- Redirige vers la version avec timestamp -->
  <script>
    const v = '20250611'; // tu mets à jour cette date à chaque deploy
    const url = new URL(window.location.href);
    if (!url.searchParams.get('v')) {
      url.searchParams.set('v', v);
      window.location.replace(url);
    }
  </script>
</body>

</html>
