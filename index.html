<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #37352f;
    }
    #background {
      /* position: fixed;
      top: 0;
      left: 0; */
      width: 5em;
      height: 2rem;
      background: #292929;
      z-index: -1;
      margin-right: 1.5em;
    }
    #clock { font-size: 3rem; font-weight: 600; }
  </style>
</head>
<body>
  <div id="background"></div>
  <div id="clock"></div>
  <script>
    function tick() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('fr-FR');
    }
    setInterval(tick, 1000);
    tick();
  </script>
</body>
</html>
